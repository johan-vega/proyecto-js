<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Framework de booTstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- LIBRERIA DE ICONOS -->
    <script src="https://kit.fontawesome.com/812c8ee19a.js" crossorigin="anonymous"></script>
    <!-- FAVICON DE LA APLICACION DE MATRICULA -->
    <link rel="shortcut icon" href="img/ico_blanco-removebg-preview.png" type="image/x-icon">
    <!-- HOJA DE ESTILOS  -->
    <link rel="stylesheet" href="css/styles.css">

</head>

<body>
    <article class="container">
        <form id="formRegistro" class="formulario">
            <h2 class="titulo">Registro de Nuevo Alumno</h2>
            <input type="text" id="regNombres" name="nombres" placeholder="Nombres" required>
            <input type="text" id="regApellidos" name="apellidos" placeholder="Apellidos" required>
            <input type="text" id="regDni" name="dni" placeholder="N° DNI (8 dígitos)" maxlength="8" required>
            <input type="email" id="regCorreo" name="correo" placeholder="Correo Electrónico" required>
            <input type="date" id="regNacimiento" name="nacimiento" required>

            <input type="text" id="apoNombres" name="apoNombres" placeholder="Nombres del Apoderado" required>
            <input type="text" id="apoCelular" name="apoCelular" placeholder="Celular del Apoderado" maxlength="9"
                required>

            <br><br>
            <button type="submit" class="boton">Registrarse</button>
            <p id="mensajeRegistro" class="mensaje"></p>
        </form>

        <form id="formLogin" class="formulario" style="display:none;">
            <h2>Iniciar Sesión</h2>
            <input type="text" id="logUsuario" placeholder="N° DNI o Usuario" required>
            <input type="password" id="logPassword" placeholder="Contraseña asignada" required>
            <button type="submit">Ingresar</button>
            <p id="mensajeLogin" class="mensaje"></p>
        </form>
        <br>

        <a class="boton" id="btnAlternarVista" href="login.html" target="_blank">Ya tengo cuenta / Iniciar Sesión</a>

    </article>
    <!-- LIBRERIA JS DE BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
