<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aulas</title>
    <!-- FRAMEWORK BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- LIBRERÍA DE ICONOS -->
    <script src="https://kit.fontawesome.com/812c8ee19a.js" crossorigin="anonymous"></script>
    <!-- FAVICON DE LA APLICACIÓN DE MATRICULA -->
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">

    <!-- FUENTES DE GOOGLE FONTS -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <!-- LIBRERÍA AJAX -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- HOJA DE ESTILOS -->
    <link rel="stylesheet" href="css/style-dashboard.css">

    <!-- LIBRERÍA JQUERY -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>
    <div class="containers">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-graduation-cap"></i>
                <h2>SISTEMA DE MATRÍCULA</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="#"><i class="fa-solid fa-house"></i>Dashboard</a></li>
                    <li><a href="dashboard2.html"><i class="fa-solid fa-user-graduate"></i>
                            Estudiantes</a></li>
                    <li><a href="cursos.html"><i class="fa-solid fa-book"></i>Cursos/Grados</a></li>
                    <li class="active"><a href="aulas.html"><i class="fa-solid fa-school"></i>Aulas</a></li>
                    <li><a href="#"><i class="fa-solid fa-money-bill-wave"></i> Pagos</a></li>
                    <li><a href="#"><i class="fa-solid fa-gear"></i>Configuración</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <img src="img/ico_blanco-removebg-preview.png" width="40PX" alt="Avatar">
                    <div class="user-info">
                        <h3>Administración</h3>
                        <a href="#">Ver perfil</a>
                    </div>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h2>Panel de Administración</h2>
                </div>
                <div class="header-right">
                    <i class="fa-solid fa-bell"></i>
                    <div class="search-bar">
                        <input type="text" placeholder="Buscar...">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                    <button id="btnLogOut" class="btn btn-danger" onclick="cerrarSesion()">Cerrar Sesión</button>
                    <div class="user-dropdown">
                        <img src="img/ico_blanco-removebg-preview.png" alt="ADMIN" width="40px" height="40px">
                        <h3>Administración <i class="fa-solid fa-chevron-down"></i></h3>
                    </div>
                </div>
            </header>
            <div class="content-body">
                <div class="card table-card">
                    <div class="card-header">
                        <h2>AULAS DISPONIBLES</h2>
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nivel</th>
                                <th>Grado</th>
                                <th>Sección</th>
                                <th>Vacantes Totales</th>
                                <th>Vacantes Disponibles</th>
                            </tr>
                        </thead>
                        <tbody id="tablaAulas">
                        </tbody>
                    </table>
                    <div class="card-footer">
                        <p>Mostrando aulas disponibles</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- ARCHIVO JAVASCRIPT -->
    <script src="js/aulas.js"></script>
    <!-- LIBRERIA SWEETALERT -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- LIBRERIA JS DE BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

</body>

</html>
